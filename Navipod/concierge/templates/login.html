<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navipod - Login</title>
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Custom Font: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" type="image/png" href="/assets/icon.png">

    <style>
        :root {
            --primary: #1DB954;
            --primary-hover: #1ed760;
            --background: #000000;
            --glass-card: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--background);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            position: relative;
        }

        /* --- NOISE TEXTURE OVERLAY --- */
        .noise-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            opacity: 0.07;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* --- FLUID ORBS BACKGROUND --- */
        .smoke-container {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            background: #000;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            mix-blend-mode: screen;
            animation: move-and-morph 20s infinite alternate ease-in-out;
        }

        /* Spotify Green Orb */
        .orb-1 {
            width: 60vw;
            height: 60vw;
            background: linear-gradient(135deg, rgba(29, 185, 84, 0.4) 0%, rgba(20, 20, 20, 0) 70%);
            top: -20%;
            left: -10%;
            animation-duration: 25s;
        }

        /* Deep Purple/Blue Orb */
        .orb-2 {
            width: 50vw;
            height: 50vw;
            background: linear-gradient(135deg, rgba(70, 0, 255, 0.4) 0%, rgba(20, 20, 20, 0) 70%);
            bottom: -15%;
            right: -10%;
            animation-delay: -5s;
            animation-duration: 30s;
        }

        /* Floating Accent Orb (Pink/Orange for subtle warmth) */
        .orb-3 {
            width: 40vw;
            height: 40vw;
            background: linear-gradient(135deg, rgba(255, 80, 150, 0.2) 0%, rgba(20, 20, 20, 0) 70%);
            top: 40%;
            left: 30%;
            animation-delay: -10s;
            animation-duration: 22s;
        }

        @keyframes move-and-morph {
            0% {
                transform: translate(0, 0) scale(1);
                border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            }

            33% {
                transform: translate(50px, -50px) scale(1.1);
                border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%;
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
                border-radius: 70% 30% 40% 60% / 40% 70% 60% 30%;
            }

            100% {
                transform: translate(0, 0) scale(1);
                border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            }
        }

        /* --- GLASS CARD --- */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards 0.2s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-card {
            background: rgba(20, 20, 20, 0.6);
            /* Slightly darker for better contrast */
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Inner shine effect */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            inset-inline: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
        }

        .login-card:hover {
            transform: translateY(-2px);
            box-shadow:
                0 30px 60px -12px rgba(0, 0, 0, 0.6),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        /* --- BRANDING --- */
        .brand-section {
            margin-bottom: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-icon {
            width: 72px;
            height: 72px;
            margin-bottom: 20px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .login-card:hover .brand-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .app-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 4px;
            color: #fff;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #bbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-subtitle {
            font-size: 0.95rem;
            color: var(--text-sub);
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        /* --- INPUTS --- */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-wrapper {
            position: relative;
        }

        .login-input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--input-border);
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .login-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }

        .login-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(29, 185, 84, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.1rem;
            pointer-events: none;
            transition: color 0.2s, transform 0.2s;
        }

        .login-input:focus~.input-icon {
            color: var(--primary);
            transform: translateY(-50%) scale(1.1);
        }

        /* --- BUTTON --- */
        .btn-login-pro {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 500px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-login-pro::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .btn-login-pro:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(29, 185, 84, 0.4);
        }

        .btn-login-pro:hover::after {
            transform: translateX(100%);
        }

        .btn-login-pro:active {
            transform: scale(0.98);
        }

        /* --- FOOTER & ERROR --- */
        .login-footer-pro {
            margin-top: 32px;
            font-size: 0.8rem;
            color: var(--text-sub);
            opacity: 0.7;
        }

        .error-pill-pro {
            background: rgba(239, 68, 68, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
            animation: shake 0.4s ease-in-out;
            backdrop-filter: blur(10px);
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-4px);
            }

            40% {
                transform: translateX(4px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 480px) {
            .login-wrapper {
                padding: 16px;
            }

            .login-card {
                padding: 40px 24px;
                border-radius: 24px;
                background: rgba(10, 10, 10, 0.7);
            }

            .orb-1,
            .orb-2,
            .orb-3 {
                filter: blur(60px);
            }
        }
    </style>
</head>

<body>
    <!-- Noise Overlay for Texture -->
    <div class="noise-overlay"></div>

    <!-- Background Fluid Orbs -->
    <div class="smoke-container">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand-section">
                <img src="/assets/icon.png" alt="Navipod" class="brand-icon"
                    onerror="this.src='/static/img/default_cover.png'">
                <h1 class="app-title">Navipod</h1>
                <p class="app-subtitle">Ultimate Music Experience</p>
            </div>

            {% if error %}
            <div class="error-pill-pro">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form action="/login" method="post" class="login-form">
                <div class="input-group">
                    <label for="username" class="sr-only">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" class="login-input" placeholder="Username"
                            required autocomplete="username">
                        <i class="fa-solid fa-user input-icon"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password" class="sr-only">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="login-input" placeholder="Password"
                            required autocomplete="current-password">
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>
                </div>

                <input type="hidden" name="next" value="{{ next }}">

                <button type="submit" class="btn-login-pro">
                    <span>Log In</span>
                </button>
            </form>

            <div class="login-footer-pro">
                <p>&copy; 2026 Navipod. Private Music Cloud.</p>
            </div>
        </div>
    </div>
</body>

</html>
