<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navipod - Login</title>
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" type="image/png" href="/assets/icon.png">
    <link rel="manifest" href="/assets/site.webmanifest">

    <style>
        :root {
            --primary: #149a51;
            --primary-hover: #118547;
            --background: #111315;
            --surface: #171a1e;
            --surface-2: #1f242a;
            --border: #2f3640;
            --input-bg: #14181c;
            --input-border: #313944;
            --text-main: #eef2f6;
            --text-sub: #98a2ad;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "IBM Plex Sans", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 22%),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                var(--background);
            background-size: auto, 24px 24px, 24px 24px, auto;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            position: relative;
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 390px;
            padding: 20px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards 0.2s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 40px 32px 32px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            inset-inline: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        /* --- BRANDING --- */
        .brand-section {
            margin-bottom: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            border-radius: 14px;
            box-shadow: none;
        }

        .app-title {
            font-size: 1.85rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-main);
            letter-spacing: -0.04em;
        }

        .app-subtitle {
            color: var(--text-sub);
            font-weight: 500;
            font-size: 0.88rem;
        }

        /* --- INPUTS --- */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-wrapper {
            position: relative;
        }

        .login-input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 500;
            transition: border-color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .login-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }

        .login-input:focus {
            outline: none;
            background: var(--surface-2);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(20, 154, 81, 0.14);
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.1rem;
            pointer-events: none;
            transition: color 0.2s, transform 0.2s;
        }

        .login-input:focus~.input-icon {
            color: var(--primary);
        }

        /* --- BUTTON --- */
        .btn-login-pro {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #f3fff8;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.96rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
            margin-top: 12px;
        }

        .btn-login-pro:hover {
            background: var(--primary-hover);
            box-shadow: 0 10px 22px rgba(20, 154, 81, 0.2);
        }

        .btn-login-pro:active {
            opacity: 0.92;
        }

        /* --- FOOTER & ERROR --- */
        .login-footer-pro {
            margin-top: 32px;
            font-size: 0.8rem;
            color: var(--text-sub);
            opacity: 0.7;
        }

        .error-pill-pro {
            background: rgba(239, 68, 68, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
            animation: shake 0.4s ease-in-out;
            backdrop-filter: blur(10px);
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-4px);
            }

            40% {
                transform: translateX(4px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 480px) {
            .login-wrapper {
                padding: 16px;
            }

            .login-card {
                padding: 40px 24px;
                border-radius: 12px;
            }
        }

        /* --- PWA INSTALL BANNER --- */
        .pwa-banner {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(120%);
            width: calc(100% - 32px);
            max-width: 420px;
            background: var(--surface-2, #1f242a);
            border: 1px solid var(--border, #2f3640);
            border-radius: 14px;
            padding: 14px 14px 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 999;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .pwa-banner.visible {
            transform: translateX(-50%) translateY(0);
        }

        .pwa-banner-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .pwa-banner-body {
            flex: 1;
            min-width: 0;
        }

        .pwa-banner-body strong {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main, #eef2f6);
            margin-bottom: 2px;
        }

        .pwa-banner-body span {
            display: block;
            font-size: 0.78rem;
            color: var(--text-sub, #98a2ad);
            line-height: 1.35;
        }

        .pwa-banner-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .pwa-install-btn {
            background: var(--primary, #149a51);
            color: #f3fff8;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 0.84rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .pwa-install-btn:hover { background: var(--primary-hover, #118547); }

        .pwa-dismiss-btn {
            background: transparent;
            border: none;
            color: var(--text-sub, #98a2ad);
            font-size: 1.3rem;
            line-height: 1;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            transition: color 0.2s;
        }

        .pwa-dismiss-btn:hover { color: var(--text-main, #eef2f6); }

        /* Only show on mobile */
        @media (min-width: 769px) {
            .pwa-banner { display: none !important; }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand-section">
                <img src="/assets/icon.png" alt="Navipod" class="brand-icon"
                    onerror="this.src='/static/img/default_cover.png'">
                <h1 class="app-title">Navipod</h1>
                <p class="app-subtitle">Sign in to your library</p>
            </div>

            {% if error %}
            <div class="error-pill-pro">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form action="/login" method="post" class="login-form">
                <div class="input-group">
                    <label for="username" class="sr-only">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" class="login-input" placeholder="Username"
                            required autocomplete="username">
                        <i class="fa-solid fa-user input-icon"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password" class="sr-only">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="login-input" placeholder="Password"
                            required autocomplete="current-password">
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>
                </div>

                <input type="hidden" name="next" value="{{ next }}">

                <button type="submit" class="btn-login-pro">
                    <span>Log In</span>
                </button>
            </form>

            <div class="login-footer-pro">
                <p>&copy; 2026 Navipod. Private Music Cloud.</p>
            </div>
        </div>
    </div>
    <!-- PWA Install Banner -->
    <div id="pwa-banner" class="pwa-banner" role="banner" aria-label="Install Navipod">
        <img src="/assets/icon.png" class="pwa-banner-icon" alt="Navipod">
        <div class="pwa-banner-body">
            <strong>Install Navipod</strong>
            <span id="pwa-banner-hint">Add to your home screen for the full app experience</span>
        </div>
        <div class="pwa-banner-actions">
            <button id="pwa-install-btn" class="pwa-install-btn">Install</button>
            <button id="pwa-dismiss-btn" class="pwa-dismiss-btn" aria-label="Dismiss">&#x2715;</button>
        </div>
    </div>

    <script>
    (function () {
        var DISMISS_KEY = 'navipod_pwa_dismissed';
        var banner      = document.getElementById('pwa-banner');
        var installBtn  = document.getElementById('pwa-install-btn');
        var dismissBtn  = document.getElementById('pwa-dismiss-btn');
        var hintEl      = document.getElementById('pwa-banner-hint');
        var deferredPrompt = null;
        var bannerVisible  = false;

        // ── Early exits ───────────────────────────────────────────────────
        // Already running as installed PWA
        if (window.navigator.standalone) return;
        if (window.matchMedia('(display-mode: standalone)').matches) return;
        // User already dismissed permanently
        if (localStorage.getItem(DISMISS_KEY)) return;

        // ── Helpers ───────────────────────────────────────────────────────
        function showBanner() {
            if (bannerVisible) return;
            bannerVisible = true;
            banner.style.display = 'flex';
            requestAnimationFrame(function () {
                requestAnimationFrame(function () { banner.classList.add('visible'); });
            });
        }

        function hideBanner() {
            bannerVisible = false;
            banner.classList.remove('visible');
            setTimeout(function () { banner.style.display = 'none'; }, 400);
        }

        function setManualMode(hint) {
            hintEl.textContent = hint;
            installBtn.textContent = 'Got it';
            installBtn.onclick = function () {
                localStorage.setItem(DISMISS_KEY, '1');
                hideBanner();
            };
        }

        function setNativeMode() {
            hintEl.textContent = 'Add to your home screen for the full app experience';
            installBtn.textContent = 'Install';
            installBtn.onclick = function () {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function (result) {
                    if (result.outcome === 'accepted') localStorage.setItem(DISMISS_KEY, '1');
                    deferredPrompt = null;
                    hideBanner();
                });
            };
        }

        dismissBtn.onclick = function () {
            localStorage.setItem(DISMISS_KEY, '1');
            hideBanner();
        };

        // ── Platform detection ────────────────────────────────────────────
        var ua      = navigator.userAgent;
        var isIOS   = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
        var isSafari = isIOS && /Safari/.test(ua) && !/CriOS|FxiOS|OPiOS/.test(ua);
        var isAndroid = /Android/.test(ua);

        // ── iOS Safari ────────────────────────────────────────────────────
        // No BeforeInstallPromptEvent on iOS — always show manual hint.
        if (isSafari) {
            setManualMode('Tap the Share button 📤 then “Add to Home Screen”');
            setTimeout(showBanner, 1400);
            return; // iOS done — skip Android + SW registration below
        }

        // ── Android / Chrome ──────────────────────────────────────────────
        // Chrome fires beforeinstallprompt when ALL PWA criteria are met:
        //   manifest present on current page + active SW + HTTPS + engagement.
        // We capture the event, prevent the mini-infobar, and show our own
        // banner instead so the user gets a consistent in-page Install button.

        window.addEventListener('beforeinstallprompt', function (e) {
            e.preventDefault();
            deferredPrompt = e;
            setNativeMode();
            showBanner();
        });

        // ── Service Worker registration ───────────────────────────────────
        // SW must be registered on a page that also has the manifest link.
        // Both conditions are now met here: <link rel=”manifest”> is in <head>
        // and we register /sw.js below, so Chrome can evaluate installability
        // on this page and fire beforeinstallprompt on qualifying visits.
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function(){});
        }
    })();
    </script>
</body>

</html>
