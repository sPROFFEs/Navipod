{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<!-- This container will be populated by app.js loadView('home') -->
<div class="empty-state">
    <div class="music-loader" aria-label="Loading">
        <div class="music-bar" style="animation-delay: 0.0s"></div>
        <div class="music-bar" style="animation-delay: 0.1s"></div>
        <div class="music-bar" style="animation-delay: 0.2s"></div>
        <div class="music-bar" style="animation-delay: 0.3s"></div>
        <div class="music-bar" style="animation-delay: 0.4s"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Expose server-rendered initial view hints for main.js.
    // main.js reads these and calls loadView exactly once — no second call here.
    window.NAVIPOD_INITIAL_VIEW  = {{ initial_view|default('home')|tojson }};
    window.NAVIPOD_INITIAL_PARAM = {{ initial_param|default(none)|tojson }};
</script>
{% endblock %}
