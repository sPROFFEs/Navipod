{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<!-- This container will be populated by app.js loadView('home') -->
<div class="empty-state">
    <div class="music-loader" aria-label="Loading">
        <div class="music-bar" style="animation-delay: 0.0s"></div>
        <div class="music-bar" style="animation-delay: 0.1s"></div>
        <div class="music-bar" style="animation-delay: 0.2s"></div>
        <div class="music-bar" style="animation-delay: 0.3s"></div>
        <div class="music-bar" style="animation-delay: 0.4s"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Trigger the specific view for this page (SPA root)
        loadView({{ initial_view|default('home')|tojson }}, {{ initial_param|default(none)|tojson }});
    });
</script>
{% endblock %}
