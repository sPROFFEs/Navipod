# =============================================================================
# Navipod — DOMAIN + Let's Encrypt deployment template
# =============================================================================
#
# This is a STANDALONE replacement for the default docker-compose.yaml.
# Copy it AND the matching nginx.conf over the real ones:
#
#     cp deployment-templates/domain/docker-compose.yaml docker-compose.yaml
#     cp deployment-templates/domain/nginx.conf nginx.conf
#     cp deployment-templates/domain/.env.example .env       # then edit
#
# The auto-updater keeps working because the file paths
# (docker-compose.yaml, nginx.conf) are unchanged.
#
# Differences from the cloudflared default:
#   - `tunnel` service removed (you publish via DNS now).
#   - `nginx` exposes 80 + 443 and reads a TLS-aware config that uses
#     envsubst to inject ${DOMAIN} at startup.
#   - New `certbot` service runs the renewal loop every 12h.
# =============================================================================

networks:
  navidrome-net:
    name: navipod-global
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  concierge:
    build: ./concierge
    container_name: concierge
    user: root
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/saas-data:/saas-data
      - ..:/workspace
      - /opt/saas-data/config/navipod.env:/run/navipod/.env
      - ./concierge/templates:/app/templates
      - ./concierge:/app
      - ./assets:/app/assets
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - DOMAIN=${DOMAIN}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CHECK_INTERVAL_MINUTES=${CHECK_INTERVAL_MINUTES:-30}
      - IDLE_THRESHOLD_MINUTES=${IDLE_THRESHOLD_MINUTES:-30}
      - HOST_DATA_ROOT=${HOST_DATA_ROOT:-/opt/saas-data}
      - APP_SOURCE_ROOT=${APP_SOURCE_ROOT:-/workspace}
      - COMPOSE_ENV_FILE=${COMPOSE_ENV_FILE:-/saas-data/config/navipod.env}
      - RUNTIME_ENV_FILE=${RUNTIME_ENV_FILE:-/run/navipod/.env}
      - NAVIDROME_IMAGE=${NAVIDROME_IMAGE:-deluan/navidrome:latest}
      - CONCURRENT_DOWNLOADS=${CONCURRENT_DOWNLOADS:-3}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - BACKUP_ROOT=${BACKUP_ROOT:-/saas-data/backups}
      - BACKUP_SCHEDULER_POLL_SECONDS=${BACKUP_SCHEDULER_POLL_SECONDS:-60}
      - UPDATE_SOURCE_REPO_URL=${UPDATE_SOURCE_REPO_URL:-https://github.com/sPROFFEs/Navipod}
      - UPDATE_SOURCE_BRANCH=${UPDATE_SOURCE_BRANCH:-main}
      - UPDATE_MANAGED_SERVICES=${UPDATE_MANAGED_SERVICES:-concierge}
      - SELF_CONTAINER_NAME=concierge
    networks:
      navidrome-net:
        ipv4_address: 172.20.0.5

  updater:
    build: ./concierge
    container_name: navipod_updater
    user: root
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/saas-data:/saas-data
      - ..:/workspace
      - /opt/saas-data/config/navipod.env:/run/navipod/.env
      - ./concierge:/app
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - DOMAIN=${DOMAIN}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CHECK_INTERVAL_MINUTES=${CHECK_INTERVAL_MINUTES:-30}
      - IDLE_THRESHOLD_MINUTES=${IDLE_THRESHOLD_MINUTES:-30}
      - HOST_DATA_ROOT=${HOST_DATA_ROOT:-/opt/saas-data}
      - APP_SOURCE_ROOT=${APP_SOURCE_ROOT:-/workspace}
      - COMPOSE_ENV_FILE=${COMPOSE_ENV_FILE:-/saas-data/config/navipod.env}
      - RUNTIME_ENV_FILE=${RUNTIME_ENV_FILE:-/run/navipod/.env}
      - NAVIDROME_IMAGE=${NAVIDROME_IMAGE:-deluan/navidrome:latest}
      - CONCURRENT_DOWNLOADS=${CONCURRENT_DOWNLOADS:-3}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - BACKUP_ROOT=${BACKUP_ROOT:-/saas-data/backups}
      - BACKUP_SCHEDULER_POLL_SECONDS=${BACKUP_SCHEDULER_POLL_SECONDS:-60}
      - UPDATE_SOURCE_REPO_URL=${UPDATE_SOURCE_REPO_URL:-https://github.com/sPROFFEs/Navipod}
      - UPDATE_SOURCE_BRANCH=${UPDATE_SOURCE_BRANCH:-main}
      - UPDATE_MANAGED_SERVICES=${UPDATE_MANAGED_SERVICES:-concierge}
      - SELF_CONTAINER_NAME=navipod_updater
      - KEEP_ROOT=true
    command: ["uvicorn", "updater_api:app", "--host", "0.0.0.0", "--port", "8090"]
    networks:
      navidrome-net:
        ipv4_address: 172.20.0.7

  nginx:
    image: nginx:latest
    container_name: navipod_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf.template:ro
      - ./assets:/app/assets:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot
    environment:
      - DOMAIN=${DOMAIN}
    # The nginx.conf shipped here uses ${DOMAIN}; envsubst injects it
    # at startup so one template works for any domain.
    command: >
      /bin/sh -c "envsubst '$$DOMAIN' < /etc/nginx/nginx.conf.template
      > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    depends_on:
      - concierge
    networks:
      navidrome-net:
        ipv4_address: 172.20.0.6

  certbot:
    image: certbot/certbot
    container_name: navipod_certbot
    restart: unless-stopped
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Renewal loop only — runs every 12h. nginx must be reloaded
    # separately (see deployment-templates/domain/README.md).
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet || true;
        sleep 12h & wait $${!};
      done"
    depends_on:
      - nginx
    networks:
      navidrome-net:

volumes:
  # Persistent volumes for Let's Encrypt state. Survive rebuilds so
  # renewals don't have to start from scratch.
  certbot-etc:
    name: navipod_certbot_etc
  certbot-www:
    name: navipod_certbot_www
