# =============================================================================
# nginx.conf — DOMAIN deployment template
# =============================================================================
#
# TLS-terminating nginx for the "own domain + Let's Encrypt" mode.
#
# Used together with deployment-templates/domain/docker-compose.yaml.
# At container startup, envsubst rewrites this file with $DOMAIN
# expanded to whatever you put in your .env. Other ${...} are nginx
# variables (Host, request_uri, ...) and are preserved literally
# because envsubst only substitutes the names listed in the command.
#
# Two server blocks:
#   :80   ACME HTTP-01 challenge directory + redirect to HTTPS.
#         Keeps cert renewal working without exposing the app over
#         plain HTTP.
#   :443  TLS termination + reverse-proxy. Same routing as the
#         cloudflared default.

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    server_tokens off;

    # ── HTTP server: ACME challenge + redirect to HTTPS ──────────────────
    server {
        listen 80;
        server_name $DOMAIN;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server: real app ────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name $DOMAIN;

        ssl_certificate     /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;

        # Modern, widely-compatible TLS settings. TLS1.2+ only.
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS: lock browsers to HTTPS for a year. Only enable AFTER
        # you have a working cert and renewals succeed — a temporary
        # cert hiccup with HSTS active locks users out for that year.
        # add_header Strict-Transport-Security "max-age=31536000" always;

        # ── Routing (identical to the default nginx.conf) ────────────────
        location = /sw.js {
            alias /app/assets/sw.js;
            default_type application/javascript;
            add_header Service-Worker-Allowed "/";
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }

        location = /assets/site.webmanifest {
            alias /app/assets/site.webmanifest;
            default_type application/manifest+json;
            add_header Cache-Control "no-cache";
            expires 0;
        }

        location /assets/ {
            alias /app/assets/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        location /updater/ {
            proxy_pass http://updater:8090/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/stream/ {
            proxy_pass http://concierge:8000;
            proxy_http_version 1.1;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_max_temp_file_size 0;
            proxy_read_timeout 3600s;
            add_header X-Accel-Buffering no;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://concierge:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
