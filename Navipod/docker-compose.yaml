networks:
  navidrome-net:
    name: navipod-global
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      navidrome-net:
        ipv4_address: 172.20.0.2

  concierge:
    build: ./concierge
    container_name: concierge
    user: root
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Para controlar Docker
      - /opt/saas-data:/saas-data # Donde se guardan las DBs y configs de usuarios
      - ..:/workspace
      - /opt/saas-data/config/navipod.env:/run/navipod/.env
      - ./concierge/templates:/app/templates
      - ./concierge:/app
      - ./assets:/app/assets
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - DOMAIN=${DOMAIN}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CHECK_INTERVAL_MINUTES=${CHECK_INTERVAL_MINUTES:-30}
      - IDLE_THRESHOLD_MINUTES=${IDLE_THRESHOLD_MINUTES:-30}
      - HOST_DATA_ROOT=${HOST_DATA_ROOT:-/opt/saas-data}
      - APP_SOURCE_ROOT=${APP_SOURCE_ROOT:-/workspace}
      - COMPOSE_ENV_FILE=${COMPOSE_ENV_FILE:-/saas-data/config/navipod.env}
      - RUNTIME_ENV_FILE=${RUNTIME_ENV_FILE:-/run/navipod/.env}
      - NAVIDROME_IMAGE=${NAVIDROME_IMAGE:-deluan/navidrome:latest}
      - CONCURRENT_DOWNLOADS=${CONCURRENT_DOWNLOADS:-3}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - BACKUP_ROOT=${BACKUP_ROOT:-/saas-data/backups}
      - BACKUP_SCHEDULER_POLL_SECONDS=${BACKUP_SCHEDULER_POLL_SECONDS:-60}
      - UPDATE_SOURCE_REPO_URL=${UPDATE_SOURCE_REPO_URL:-https://github.com/sPROFFEs/Navipod}
      - UPDATE_SOURCE_BRANCH=${UPDATE_SOURCE_BRANCH:-main}
      - UPDATE_MANAGED_SERVICES=${UPDATE_MANAGED_SERVICES:-concierge nginx tunnel}
      - SELF_CONTAINER_NAME=concierge
    networks:
      navidrome-net:
        ipv4_address: 172.20.0.5

  updater:
    build: ./concierge
    container_name: navipod_updater
    user: root
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/saas-data:/saas-data
      - ..:/workspace
      - /opt/saas-data/config/navipod.env:/run/navipod/.env
      - ./concierge:/app
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - DOMAIN=${DOMAIN}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CHECK_INTERVAL_MINUTES=${CHECK_INTERVAL_MINUTES:-30}
      - IDLE_THRESHOLD_MINUTES=${IDLE_THRESHOLD_MINUTES:-30}
      - HOST_DATA_ROOT=${HOST_DATA_ROOT:-/opt/saas-data}
      - APP_SOURCE_ROOT=${APP_SOURCE_ROOT:-/workspace}
      - COMPOSE_ENV_FILE=${COMPOSE_ENV_FILE:-/saas-data/config/navipod.env}
      - RUNTIME_ENV_FILE=${RUNTIME_ENV_FILE:-/run/navipod/.env}
      - NAVIDROME_IMAGE=${NAVIDROME_IMAGE:-deluan/navidrome:latest}
      - CONCURRENT_DOWNLOADS=${CONCURRENT_DOWNLOADS:-3}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - BACKUP_ROOT=${BACKUP_ROOT:-/saas-data/backups}
      - BACKUP_SCHEDULER_POLL_SECONDS=${BACKUP_SCHEDULER_POLL_SECONDS:-60}
      - UPDATE_SOURCE_REPO_URL=${UPDATE_SOURCE_REPO_URL:-https://github.com/sPROFFEs/Navipod}
      - UPDATE_SOURCE_BRANCH=${UPDATE_SOURCE_BRANCH:-main}
      - UPDATE_MANAGED_SERVICES=${UPDATE_MANAGED_SERVICES:-concierge nginx tunnel}
      - SELF_CONTAINER_NAME=navipod_updater
      - KEEP_ROOT=true
    command: ["uvicorn", "updater_api:app", "--host", "0.0.0.0", "--port", "8090"]
    networks:
      navidrome-net:
        ipv4_address: 172.20.0.7

  nginx:
    image: nginx:latest
    container_name: navipod_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./assets:/app/assets:ro
    depends_on:
      - concierge
    networks:
      navidrome-net:
        ipv4_address: 172.20.0.6
