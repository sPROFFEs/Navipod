events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        
        # Service Worker — must be served from root scope with no-cache
        # and the Service-Worker-Allowed header to control the full app.
        location = /sw.js {
            alias /app/assets/sw.js;
            default_type application/javascript;
            add_header Service-Worker-Allowed "/";
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }

        # Web App Manifest — must have the correct MIME type for Chrome
        # to accept it as a PWA manifest.
        location = /assets/site.webmanifest {
            alias /app/assets/site.webmanifest;
            default_type application/manifest+json;
            add_header Cache-Control "no-cache";
            expires 0;
        }

        # Digital Asset Links — required for TWA domain verification.
        # Deploy assetlinks.json to /app/assets/assetlinks.json after
        # generating the Android signing keystore (see navipod-twa/README.md).
        location = /.well-known/assetlinks.json {
            alias /app/assets/assetlinks.json;
            default_type application/json;
            add_header Access-Control-Allow-Origin "*";
            add_header Cache-Control "no-cache";
            expires 0;
        }

        # Servir assets directamente desde el disco
        location /assets/ {
            alias /app/assets/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        location /updater/ {
            proxy_pass http://updater:8090/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/stream/ {
            proxy_pass http://concierge:8000;
            proxy_http_version 1.1;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_max_temp_file_size 0;
            proxy_read_timeout 3600s;
            add_header X-Accel-Buffering no;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy para el backend de FastAPI
        location / {
            proxy_pass http://concierge:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
